# Static clickhouse-backup-fips config used by `connectivity_against_non_fips_clickhouse_server`.
#
# Mounted into the FIPS backup container via the per-PID copy of
# ``configs/backup/`` performed by ``regression.py``.
#
# `clickhouse.host: clickhouse_nonfips_server` resolves on the docker
# network to the dedicated non-FIPS ClickHouse server brought up by the
# scenario (`altinity/clickhouse-server:25.8.16.10002.altinitystable`).
# That server runs with image defaults: only `tcp_port: 9000` and
# `http_port: 8123` are bound; no `tcp_port_secure` listener.
#
# `clickhouse.port: 9440` and `secure: true` together match the
# FIPS-compatible client requirement (TLS-only over the secure native
# TCP port). With the non-FIPS server not exposing `:9440`, the FIPS
# clickhouse-backup cannot establish a connection and the `tables`
# command must fail. This proves a FIPS-built clickhouse-backup
# configured for TLS-only cannot reach a default-config non-FIPS
# ClickHouse server.
general:
  log_level: warn
  remote_storage: none
clickhouse:
  config_dir: /etc/clickhouse-server
  host: clickhouse_nonfips_server
  port: 9440
  username: default
  password: ''
  timeout: 5s
  secure: true
