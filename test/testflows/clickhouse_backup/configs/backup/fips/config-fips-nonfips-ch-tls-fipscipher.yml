# Static clickhouse-backup-fips config used by the FIPS-cipher arm of
# `outbound_tls_to_nonfips_clickhouse_with_cipher_profile`.
#
# Mounted into the FIPS backup container via the per-PID copy of
# `configs/backup/` performed by `regression.py`.
#
# Targets the non-FIPS Altinity ClickHouse server's secure native TLS
# port `9440`. The server has been configured by
# `configs/clickhouse_nonfips_server/config.d/listeners-fips-cipher.xml`
# to offer a single FIPS-approved TLSv1.2 cipher
# (`ECDHE-RSA-AES128-GCM-SHA256`) and a single FIPS-approved TLSv1.3
# suite (`TLS_AES_128_GCM_SHA256`).
#
# `secure: true` so the FIPS-built binary uses TLS;
# `skip_verify: true` so the assertion stays focused on cipher-policy
# outcomes (the cluster's static self-signed cert is not in the FIPS
# binary's trust store).
general:
  log_level: warn
  remote_storage: none
clickhouse:
  config_dir: /etc/clickhouse-server
  host: clickhouse_nonfips_server
  port: 9440
  username: default
  password: ''
  timeout: 5s
  secure: true
  skip_verify: true
